<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
</head>

<body>

    <h2>Rock Paper Scissors</h2>
    <h3>Welcome! Best of 5 wins.</h3>
    <h4 id="outcome"></h4>
    <p class="human-score">Human Score: 0</p>
    <p class="cpu-score">CPU Score: 0</p>
    <p>Click on any of the buttons to confirm your throw</p>
    <section id="buttons">
        <button id="rock">Rock</button>
        <button id="paper">Paper</button>
        <button id="scissors">Scissors</button>
    </section>

    <section>
        <p>Results:</p>
        <p class="results"></p>
    </section>

    <div>
    </div>

    <script src="index.js"></script>

</body>

</html>
